            proxy_pass https://smt.123.rr.kg/;
            proxy_set_header Host smt.123.rr.kg;
            sub_filter '/api' '/smt/api';
            sub_filter_once off;
            sub_filter_types application/vnd.apple.mpegurl text/plain;
            proxy_set_header Accept-Encoding "";
        }
    }

    resolver 1.1.1.1 ipv6=off valid=30s;

    # stream-link 反代
    server {
        listen 30001;
        listen [::]:30001;
        server_name cdn5.163189.xyz;
        proxy_buffering off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_set_header Accept "*/*";

        location ~ \.m3u$ {
            proxy_pass https://www.stream-link.org;
            proxy_set_header Host www.stream-link.org;
            sub_filter_once off;
            sub_filter_types *;
            sub_filter 'https://' 'http://$host:30001/p/https://';
            proxy_set_header Accept-Encoding "";
        }
        location ^~ /p/ {
            resolver 1.1.1.1 ipv6=off;
            set $target $request_uri;
            if ($target ~ "^/p/(https?://[^/]+)(/.*)$") {
                set $upstream_host $1;
                set $upstream_path $2;
            }
            if ($upstream_host = "") { return 404; }
            proxy_pass $upstream_host$upstream_path;
            proxy_set_header Host $proxy_host;
            proxy_set_header Referer https://www.stream-link.org/;
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types application/vnd.apple.mpegurl text/plain;
            sub_filter '/2600_' 'http://$host:30001/p/$upstream_host/2600_';
            sub_filter '/hls_' 'http://$host:30001/p/$upstream_host/hls_';
            sub_filter 'https://' 'http://$host:30001/p/https://';
            proxy_intercept_errors on;
            error_page 301 302 307 = @redirect;
        }
        location @redirect {
            set $redirect_url $upstream_http_location;
            if ($redirect_url ~ "^/") { set $redirect_url https://$proxy_host$redirect_url; }
            set $redirect_url /p/$redirect_url;
            return 302 $redirect_url;
        }
        location / { return 404; }
    }

    # 订阅转换服务
    server {
        listen 30000;
        listen [::]:30000;
        server_name cdn5.163189.xyz;
        proxy_set_header Host cdn.qd.je;
        location /mytv.m3u {
            if ($auth_ok = 0) { return 302 https://cdn5.163189.xyz/403/?mytv; }
            proxy_pass https://cdn.qd.je/mytv.m3u;
            sub_filter '服务器ip' '$host';
            sub_filter '.m3u8' '.m3u8?token=$arg_token';
            sub_filter 'smt3.2.1.php?' 'smt3.2.1.php?token=$arg_token&';
            sub_filter '?u=test' '&u=test';
            sub_filter '?163189' '?163189&token=$arg_token';
            sub_filter_once off;
            sub_filter_types *;
            proxy_set_header Accept-Encoding "";
        }
    }
