    # 20010 多路径分流
    server {
        listen 20010;
        listen [::]:20010;
        server_name cdn5.163189.xyz;
        location / {
            if ($auth_ok = 0) { return 302 https://cdn5.163189.xyz/403/?mytv; }
            proxy_pass https://cdn11.123.rr.kg;
            proxy_set_header Host cdn11.123.rr.kg;
        }
        location /cdn13/ {
            if ($auth_ok = 0) { return 302 https://cdn5.163189.xyz/403/?mytv; }
            proxy_pass https://cdn13.123.rr.kg/;
            proxy_set_header Host cdn13.123.rr.kg;
            sub_filter '/api' '/cdn13/api';
            sub_filter_once off;
            sub_filter_types application/vnd.apple.mpegurl text/plain;
            proxy_set_header Accept-Encoding "";
        }
        location /o12/ {
            if ($auth_ok = 0) { return 302 https://cdn5.163189.xyz/403/?mytv; }
            proxy_pass https://o12.123.rr.kg/;
            proxy_set_header Host o12.123.rr.kg;
        }
        location /smt/ {
