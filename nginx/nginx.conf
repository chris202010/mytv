user www-data;
worker_processes auto;
pcre_jit on;

error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules/*.conf;

events {
    worker_connections 2048;  # 提高连接数上限以应对视频流并发切片
    multi_accept on;         # 允许多连接同时接受
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 缓存路径配置
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=24h use_temp_path=off;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # 禁用 nginx 版本信息
    server_tokens off;

    # 统一禁用 gzip，防止视频流文本二次压缩导致播放器解码失败
    gzip off;
    gzip_vary off;

    # 定义 token 来源
    map $arg_token $token_to_check {
        default $arg_token;
    }

    # 定义允许的 token 列表
    map $token_to_check $auth_ok {
        default 0;
        "mytv123"   1;  # 默认 Token
    }

	# 屏蔽 Cloudflare 响应头，避免混淆内网播放器
	proxy_hide_header Server;
	proxy_hide_header Alt-Svc;
	proxy_hide_header Expect-CT;
	proxy_hide_header report-to;
	proxy_hide_header Nel;
	proxy_hide_header server-timing;

	# 自定义响应头：缓存命中状态和请求键
	add_header X-Cache-Status $upstream_cache_status;
	add_header X-Cache-Key $scheme$host$request_uri;

	# 代理头设置
	proxy_set_header X-Real-IP $remote_addr;  # 传递客户端真实 IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

	# 优化点 1：显式声明长连接与 HTTP/1.1，彻底解决上游 Cloudflare 报 400 的问题
    proxy_http_version 1.1;
    proxy_set_header Connection "keep-alive";

	# 优化点 2：将 UA 伪装为标准的原生苹果浏览器内核，彻底绕过源站防盗链引发的 403 拒绝
    proxy_set_header User-Agent "Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/15E148";

	# SSL 安全握手配置（回源 Cloudflare 必备）
	proxy_ssl_protocols TLSv1.2 TLSv1.3;
	proxy_ssl_ciphers HIGH:!aNULL:!MD5;
	proxy_ssl_verify off; # 忽略上游自签或未知证书验证
	proxy_ssl_server_name on; # 启用 SNI 扩展支持

	# 默认缓存配置
	proxy_cache my_cache;
	proxy_cache_lock on;
	proxy_cache_key "$scheme$host$request_uri";
	proxy_cache_valid 200 206 5s;
   	proxy_ignore_headers Cache-Control Expires;
   	expires 5s;

    # 反代设置：第一个网站
    server {
        listen 20000;
		listen [::]:20000; 
        server_name cdn5.163189.xyz;

		proxy_set_header Host cdn.123.rr.kg;

		location / {
			if ($auth_ok = 0) {
				return 302 https://cdn5.163189.xyz/403/?mytv;
			}
            proxy_pass https://cdn.123.rr.kg;
        }

        location ~* /api/ {
	    	if ($auth_ok = 0) {
            	return 302 https://cdn5.163189.xyz/403/?mytv;
            }
            proxy_pass https://cdn.123.rr.kg;
	    	proxy_cache_valid 200 206 60s;
	    	expires 60s;
        }
    }

