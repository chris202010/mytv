user www-data;
worker_processes auto;
pcre_jit on;

error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=24h use_temp_path=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    server_tokens off;
    gzip off;
    gzip_vary off;

    map $arg_token $token_to_check {
        default $arg_token;
    }

    map $token_to_check $auth_ok {
        default 0;
        "mytv123"   1;
    }

    proxy_hide_header Server;
    proxy_hide_header Alt-Svc;
    proxy_hide_header Expect-CT;
    proxy_hide_header report-to;
    proxy_hide_header Nel;
    proxy_hide_header server-timing;

    add_header X-Cache-Status $upstream_cache_status;
    add_header X-Cache-Key $scheme$host$request_uri;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_http_version 1.1;
    proxy_set_header Connection "keep-alive";
    proxy_set_header User-Agent "Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/15E148";

    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_ssl_ciphers HIGH:!aNULL:!MD5;
    proxy_ssl_verify off;
    proxy_ssl_server_name on;

    proxy_cache my_cache;
    proxy_cache_lock on;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 206 5s;
    proxy_ignore_headers Cache-Control Expires;
    expires 5s;

    # 20000 -> cdn.123.rr.kg
    server {
        listen 20000;
        listen [::]:20000;
        server_name cdn5.163189.xyz;
        proxy_set_header Host cdn.123.rr.kg;
        location / {
            if ($auth_ok = 0) { return 302 https://cdn5.163189.xyz/403/?mytv; }
            proxy_pass https://cdn.123.rr.kg;
        }
        location ~* /api/ {
            if ($auth_ok = 0) { return 302 https://cdn5.163189.xyz/403/?mytv; }
            proxy_pass https://cdn.123.rr.kg;
            proxy_cache_valid 200 206 60s;
            expires 60s;
        }
    }

