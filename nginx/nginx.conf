user www-data;
worker_processes auto;
pcre_jit on;

error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules/*.conf;

events {
    worker_connections 2048;  # 提高连接数以应对视频流多切片并发
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 缓存路径配置
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=24h use_temp_path=off;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # 隐藏 Nginx 版本
    server_tokens off;

    # 统一禁用 Gzip，防止视频流和 M3U8 文本被二次压缩导致播放器解码失败
    gzip off;
    gzip_vary off;

    # 定义 token 来源
    map $arg_token $token_to_check {
        default $arg_token;
    }

    # 定义允许的 token 列表
    map $token_to_check $auth_ok {
        default 0;
        "mytv123"   1;  # 默认 Token[span_0](start_span)[span_0](end_span)
    }

    # 屏蔽 Cloudflare 响应头，防止混淆播放器
    proxy_hide_header Server;
    proxy_hide_header Alt-Svc;
    proxy_hide_header Expect-CT;
    proxy_hide_header report-to;
    proxy_hide_header Nel;
    proxy_hide_header server-timing;

    # 自定义响应头
    add_header X-Cache-Status $upstream_cache_status;
    add_header X-Cache-Key $scheme$host$request_uri;

    # 优化点 1：全局开启 HTTP/1.1，这对反代套了 Cloudflare 的视频流至关重要
    proxy_http_version 1.1;
    proxy_set_header Connection ""; # 保持长连接，防止播几秒就断流

    # 基础代理头
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # 优化点 2：统一伪装播放器 User-Agent，防止被源站防盗链拦截
    proxy_set_header User-Agent "TiviMate/5.1.0";

    # SSL 握手优化
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_ssl_ciphers HIGH:!aNULL:!MD5;
    proxy_ssl_verify off;
    proxy_ssl_server_name on;

    # 默认缓存配置
    proxy_cache my_cache;
    proxy_cache_lock on;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 206 5s;
    proxy_ignore_headers Cache-Control Expires;
    expires 5s;

    # 反代设置：第一个网站
    server {
        listen 20000;
        listen [::]:20000; 
        server_name cdn5.163189.xyz;

        proxy_set_header Host cdn.123.rr.kg;

        location / {
            if ($auth_ok = 0) {
                return 302 https://cdn5.163189.xyz/403/?mytv;
            }
            proxy_pass https://cdn.123.rr.kg;
        }

        location ~* /api/ {
            if ($auth_ok = 0) {
                return 302 https://cdn5.163189.xyz/403/?mytv;
            }
            proxy_pass https://cdn.123.rr.kg;
            proxy_cache_valid 200 206 60s;
            expires 60s;
        }
    }

